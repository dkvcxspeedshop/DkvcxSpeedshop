<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DkvcxSpeedshop</title>
    <style>
        /* ==========================================================================
           1. CORE STYLES & VARIABLE CONFIGURATION
           ========================================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-color: #f1ede4;       /* Warna krem latar belakang utama */
            --dark-color: #2b2a28;     /* Warna abu-abu gelap/hitam tombol & teks */
            --white-color: #ffffff;    /* Warna putih */
            --whatsapp-green: #128c7e; /* Warna hijau WhatsApp asli */
            --whatsapp-light: #25d366; /* Warna hijau WhatsApp terang */
        }

        body {
            background-color: var(--bg-color);
            color: var(--dark-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Simulasi Frame Mobile */
        .phone-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: var(--bg-color);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        /* Area Konten Utama yang Bisa Di-scroll */
        .scrollable-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15px 40px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .scrollable-content::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }

        /* ==========================================================================
           2. HEADER COMPONENTS (LOGO & SUBTITLE)
           ========================================================================== */
        .header-section {
            width: 100%;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 30px;
        }

        .logo-placeholder {
            width: 80%;
            max-width: 280px;
            height: auto;
            margin-bottom: 15px;
        }

        .subtitle-commission {
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            line-height: 1.4;
            color: var(--dark-color);
            padding: 0 10px;
        }

        /* ==========================================================================
           3. HOME PAGE (MENU SELECTION)
           ========================================================================== */
        #home-page {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
        }

        .btn-category {
            background-color: var(--dark-color);
            color: var(--white-color);
            border: none;
            padding: 14px 0;
            width: 70%;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 10px;
            margin-bottom: 25px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
        }

        .btn-category:active {
            transform: scale(0.96);
        }

        .instruction-text {
            font-size: 24px;
            font-weight: normal;
            color: #333333;
            text-align: center;
            margin-top: 20px;
            max-width: 80%;
            line-height: 1.3;
        }

        /* ==========================================================================
           4. PRODUCT LIST PAGE
           ========================================================================== */
        #product-list-page {
            width: 100%;
            display: none;
        }

        .category-title {
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 25px;
            letter-spacing: 1px;
        }

        .product-card {
            background: transparent;
            margin-bottom: 25px;
            cursor: pointer;
        }

        .product-image-frame {
            border: 4px solid var(--dark-color);
            border-radius: 18px;
            background-color: var(--white-color);
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .product-image-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 5px;
        }

        .product-details-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 8px 5px 0 5px;
            border-bottom: 4px solid var(--dark-color);
            padding-bottom: 5px;
        }

        .product-name-title {
            font-size: 15px;
            font-weight: 900;
            text-transform: uppercase;
            max-width: 70%;
            line-height: 1.2;
        }

        .product-price-tag {
            font-size: 18px;
            font-weight: 900;
            text-align: right;
        }

        .back-nav-button {
            align-self: flex-start;
            background: none;
            border: none;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* ==========================================================================
           5. REQUEST / BOTTOM WHATSAPP CALL TO ACTION
           ========================================================================== */
        .request-cta-section {
            width: 100%;
            text-align: center;
            margin-top: 40px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .request-text {
            font-size: 26px;
            font-weight: bold;
            color: #2b2a28;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .btn-whatsapp-cta {
            background-color: #00cc2c;
            color: var(--white-color);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px 30px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            text-decoration: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            transition: transform 0.2s;
        }

        .btn-whatsapp-cta:active {
            transform: scale(0.96);
        }

        .btn-whatsapp-cta svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        /* ==========================================================================
           6. POPUP DETAIL MODAL
           ========================================================================== */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 100;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-card {
            background-color: var(--dark-color);
            width: 100%;
            border-radius: 25px;
            padding: 15px;
            color: var(--white-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            position: relative;
        }

        .modal-close-trigger {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: var(--white-color);
            cursor: pointer;
        }

        .modal-image-frame {
            background-color: var(--white-color);
            width: 100%;
            aspect-ratio: 4 / 3;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 12px;
        }

        .modal-image-frame img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .modal-product-title {
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .modal-grid-layout {
            display: table;
            width: 100%;
        }

        .modal-grid-row {
            display: table-row;
        }

        .modal-left-specs {
            display: table-cell;
            font-size: 15px;
            font-weight: bold;
            text-transform: uppercase;
            line-height: 1.5;
            padding-bottom: 5px;
        }

        .modal-right-actions {
            display: table-cell;
            text-align: right;
            vertical-align: top;
        }

        .modal-price-display {
            font-size: 22px;
            font-weight: 900;
            margin-bottom: 15px;
        }

        .btn-modal-buy {
            display: inline-block;
            background-color: var(--white-color);
            color: var(--dark-color);
            font-size: 22px;
            font-weight: 900;
            text-transform: uppercase;
            text-decoration: none;
            padding: 5px 25px;
            border-radius: 8px;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }

        .btn-modal-buy:active {
            background-color: #dddddd;
        }

        /* ==========================================================================
           7. PERSISTENT FIXED FOOTER (SOSIAL MEDIA)
           ========================================================================== */
        .fixed-social-footer {
            width: 100%;
            background-color: var(--dark-color);
            padding: 12px 10px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: relative;
            z-index: 50;
        }

        .social-link-item {
            display: flex;
            align-items: center;
            color: var(--white-color);
            text-decoration: none;
            font-size: 12px;
            font-weight: bold;
            letter-spacing: 0.5px;
            gap: 5px;
        }

        .social-link-item svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }
    </style>
</head>
